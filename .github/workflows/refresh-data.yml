name: Refresh Data

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & convert latest data
        run: node scripts/fetch-data.js
        env:
          POLITIQUES_CSV_URL: ${{ secrets.POLITIQUES_CSV_URL }}
          AFFAIRES_CSV_URL: ${{ secrets.AFFAIRES_CSV_URL }}
          CANDIDATS_CSV_URL: ${{ secrets.CANDIDATS_CSV_URL }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git diff --staged --quiet || git commit -m "chore: refresh data $(date +%Y-%m-%d)"
          git push

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
